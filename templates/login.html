<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Result Analysis System – Login</title>
  <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>

  <!-- Background grid decoration -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-blob bg-blob--1" aria-hidden="true"></div>
  <div class="bg-blob bg-blob--2" aria-hidden="true"></div>

  <div class="login-wrap">

    <!-- ── Card ── -->
    <div class="login-card">

      <!-- Logo + branding -->
      <div class="login-logo">
        <div class="login-logo__icon">
          <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
            <path d="M7 20L11 14L15 17L19 10L21 13" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="login-logo__text">
          <span class="login-logo__title">Result Analysis</span>
          <span class="login-logo__badge">VTU · Academic Portal</span>
        </div>
      </div>

      <div class="login-heading">
        <h1>Welcome back</h1>
        <p>Sign in to your account to continue</p>
      </div>

      <!-- Security banner -->
      <div class="security-banner">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <span>Secured Result Analysis</span>
      </div>

      <!-- Form -->
      <form id="loginForm" autocomplete="on" novalidate>

        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrap">
            <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="username" name="username" placeholder="Enter your username"
                   required autocomplete="username" maxlength="64" spellcheck="false">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <input type="password" id="password" name="password" placeholder="Enter your password"
                   required autocomplete="current-password" maxlength="128">
            <button type="button" class="toggle-eye" id="toggleEye" aria-label="Toggle password visibility">
              <svg id="eyeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" id="loginBtn" class="login-btn">
          <span id="loginBtnText">Sign In</span>
          <svg id="loginBtnArrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
          <span id="loginSpinner" class="spinner hidden"></span>
        </button>

      </form>

      <!-- Message area -->
      <div id="message" class="login-message hidden" role="alert" aria-live="polite"></div>

    </div>

    <!-- ── Footer ── -->
    <footer class="login-footer">
      <span>Jnanavikas Institute of Technology</span>
      <span class="footer-dot">·</span>
      <span>VTU Affiliated</span>
      <span class="footer-dot">·</span>
      <span class="version-tag">v1.0.0</span>
    </footer>

  </div>

  <script src="/static/js/login.js"></script>
</body>
</html>
